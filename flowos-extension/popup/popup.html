<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 400px;
      background: #0A0E14;
      color: #E8ECF1;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      color: #00D68F;
      letter-spacing: 0.5px;
    }

    .settings-btn {
      background: none;
      border: none;
      color: #7A8BA5;
      cursor: pointer;
      font-size: 16px;
    }

    .score-card {
      background: #1A2230;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .grade {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .grade.A { color: #00D68F; }
    .grade.B { color: #4A9EFF; }
    .grade.C { color: #FFB74D; }
    .grade.D { color: #FF8A65; }
    .grade.F { color: #FF6B6B; }

    .score-label {
      font-size: 11px;
      color: #7A8BA5;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: #1A2230;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .stat-value.productive { color: #00D68F; }
    .stat-value.neutral { color: #7A8BA5; }
    .stat-value.distracting { color: #FF6B6B; }

    .stat-label {
      font-size: 9px;
      color: #4A5568;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .focus-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .focus-btn.off {
      background: #00D68F;
      color: #0A0E14;
    }

    .focus-btn.on {
      background: #FF6B6B;
      color: #fff;
    }

    .focus-btn:hover { opacity: 0.9; transform: scale(0.98); }

    .side-panel-link {
      display: block;
      text-align: center;
      color: #4A9EFF;
      font-size: 12px;
      text-decoration: none;
      padding: 8px;
    }

    .side-panel-link:hover { text-decoration: underline; }

    .top-sites {
      margin-top: 12px;
    }

    .top-sites h3 {
      font-size: 11px;
      color: #4A5568;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .site-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .site-domain {
      font-size: 12px;
      color: #E8ECF1;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-time {
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #7A8BA5;
    }

    .site-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .site-dot.productive { background: #00D68F; }
    .site-dot.neutral { background: #7A8BA5; }
    .site-dot.distracting { background: #FF6B6B; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⚡ FlowOS</span>
    <button class="settings-btn" id="settingsBtn">⚙️</button>
  </div>

  <div class="score-card">
    <div class="grade A" id="gradeDisplay">—</div>
    <div class="score-label">Flow Score</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value productive" id="productiveTime">0m</div>
      <div class="stat-label">Productive</div>
    </div>
    <div class="stat-card">
      <div class="stat-value neutral" id="neutralTime">0m</div>
      <div class="stat-label">Neutral</div>
    </div>
    <div class="stat-card">
      <div class="stat-value distracting" id="distractingTime">0m</div>
      <div class="stat-label">Distracting</div>
    </div>
  </div>

  <button class="focus-btn off" id="focusBtn">🔒 Start Focus Mode</button>

  <a href="#" class="side-panel-link" id="openSidePanel">📊 Open Full Dashboard</a>

  <div class="top-sites" id="topSites">
    <h3>Top Sites Today</h3>
  </div>

  <script src="popup.js"></script>
</body>
</html>
