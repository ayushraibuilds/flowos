name: flowos
description: "A personal operating system for time, energy, and attention."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database (offline-first)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Backend sync
  supabase_flutter: ^2.9.0

  # Navigation
  go_router: ^14.8.1

  # UI / Animations
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.4
  confetti: ^0.8.0
  rive: ^0.14.7

  # Audio
  just_audio: ^0.9.43
  audio_session: ^0.1.25

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # HTTP
  dio: ^5.7.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  haptic_feedback: ^0.5.1+1
  home_widget: ^0.7.0
  dynamic_color: ^1.7.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.2
  drift_dev: ^2.22.1
  mockito: ^5.4.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/sounds/
    - assets/images/
    - assets/animations/
    - assets/data/

  # JetBrains Mono fonts — download and uncomment when ready:
  # fonts:
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
  #       - asset: assets/fonts/JetBrainsMono-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/JetBrainsMono-Bold.ttf
  #         weight: 700

